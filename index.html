      html {

      .navbar-toggler {
        width: 20px;
        height: 20px;
        position: relative;
        transition: 0.2s;

      nav {

      .navbar-toggler,

        outline: none;
        box-shadow: none;
        border: 0;
        position: relative;
      }

      .navbar-toggler span {
        margin: 0;
        padding: 0;
      }

      .toggler-icon {
        display: block;
        position: absolute;
        height: 2.2px;
        width: 100%;
        background: #ffffff;
        border-radius: 0px;
        opacity: 1;
        left: 0;
        transform: rotate(0deg);
        transition: 0.15s;
      }

      .middle-bar {
        margin-top: 0px;
      }

      /* State when the navbar is collapsed */

      .navbar-toggler.collapsed .top-bar {
        position: absolute;
        top: 3px;
        transform: rotate(0deg);
      }

      .navbar-toggler.collapsed .bottom-bar {
        width: 60%;
        position: absolute;
        top: 13px;
        left: 9px;
        transform: rotate(0deg);
      }

      /* when navigation is clicked */

      .navbar-toggler .top-bar {
        top: 7px;
        transform: rotate(-45deg);
      }

      .navbar-toggler .bottom-bar {
        top: 7px;
        transform: rotate(45deg);
      }

      /* Color of 3 lines */

      .navbar-toggler.collapsed .toggler-icon {
